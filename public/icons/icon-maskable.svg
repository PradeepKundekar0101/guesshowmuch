    <text
      x="0" y="0"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-style="italic"
      font-weight="400"
      font-size="260"
      fill="#faf7f0"
    >$</text>
  </g>

  <circle cx="340" cy="172" r="18" fill="#1f7a4f"/>
</svg>
